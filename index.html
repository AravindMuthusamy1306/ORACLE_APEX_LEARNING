<pre>-- Standard APEX table pattern
CREATE TABLE employees (

  status     VARCHAR2(10)  DEFAULT 'ACTIVE'

);</pre>

<h2>Essential Joins for Reports</h2>
<pre>SELECT e.emp_id, e.first_name || ' ' || e.last_name AS full_name,

FROM   employees e

JOIN   jobs        j ON e.job_id  = j.job_id

ORDER  BY e.last_name;</pre>

<h2>Views — Your APEX Report Friend</h2>
<pre>CREATE OR REPLACE VIEW v_emp_details AS
SELECT e.emp_id, e.first_name, e.last_name,

`<div>
<h2>The Component Decision Tree</h2>
<div class="arch">Need to SHOW data?
├── Editable in-grid?   → Interactive Grid
├── Filters + facets?   → Faceted Search
├── End-user columns?   → Interactive Report
├── Fixed layout/print? → Classic Report
└── Visual tiles?       → Cards Region

Need to ENTER data?
├── Single record?      → Form page (table-based)
└── Multi-record?       → Interactive Grid (edit mode)

Need VISUALS?
├── Trends/comparisons? → Chart (bar/line/pie)
└── Summary metrics?    → Cards or Custom Region</div>

<h2>Interactive Report (IR)</h2>
<div class="card card-accent"><div class="card-label card-label-accent">What it is</div><p>A smart table with built-in filtering, sorting, grouping, pivot, highlight, download (CSV/Excel/PDF), and saved views — all without writing a single line of JS.</p></div>
<ul>
<li><strong>When to use:</strong> Any "list of records" that users need to search/filter/export</li>
<li><strong>When NOT to use:</strong> Precise column widths for print reports → use Classic Report</li>
<li><strong>Interview tip:</strong> IR saves preferences in <code>APEX_IR_SAVED_REPORTS</code> — each user gets their own view</li>
</ul>

<h2>Interactive Grid (IG)</h2>
<div class="card card-blue"><div class="card-label card-label-blue">What it is</div><p>Like a spreadsheet embedded in your page. Users can edit, add, delete rows inline. APEX handles DML automatically.</p></div>
<ul>
<li><strong>Use for:</strong> Bulk data entry, inline editing (expense lines, order items, scheduling)</li>
<li><strong>Common mistake:</strong> Not setting "Allowed Operations" — always explicitly allow/deny Insert/Update/Delete</li>
</ul>

<h2>Cards Region SQL</h2>
<pre>SELECT emp_id,
       first_name || ' ' || last_name AS title,
       dept_name                      AS subtitle,
       salary                         AS badge_value,
       'PERSON'                       AS icon_name
FROM v_emp_details WHERE status = 'ACTIVE'</pre>

<h2>Chart Types</h2>
<table><tr><th>Type</th><th>Use for</th></tr>
<tr><td>Bar/Column</td><td>Comparing categories (sales by region, headcount by dept)</td></tr>
<tr><td>Line</td><td>Trends over time (monthly revenue, weekly signups)</td></tr>
<tr><td>Pie/Donut</td><td>Part-of-whole — max 5-6 slices</td></tr>
<tr><td>Gauge</td><td>KPI vs target (progress toward goal)</td></tr></table>

<div class="card card-amber"><div class="card-label card-label-amber">Dashboard Pattern</div><p>Page 2 → 4 metric cards (top row) + 1 bar chart (left) + 1 pie chart (right) + 1 IR (bottom). Each region has its own SQL. No JS needed — complete executive dashboard in under an hour.</p></div>
</div>`,

`<div>
<p>Dynamic Actions (DAs) are APEX's event-driven engine. They let you react to user interactions and run actions — all configured through a UI, not hand-coded.</p>
<div class="card card-accent"><div class="card-label card-label-accent">Analogy</div><p>DAs are like event listeners in JavaScript. "When X happens → do Y" — but you configure them in a form instead of writing <code>document.addEventListener()</code>.</p></div>

<h2>DA Structure</h2>
<div class="arch">WHEN:     [Event]      on [Element]    (e.g., Change on P3_DEPT_ID)
  IF:     [Condition]  optional filter (e.g., item is not null)
    THEN: [True Action]               (e.g., Refresh P3_EMP_LIST)
    ELSE: [False Action]              (e.g., Clear P3_EMP_LIST)</div>

<h2>Most-Used Dynamic Actions</h2>
<table><tr><th>Action</th><th>Real use case</th></tr>
<tr><td>Show / Hide</td><td>Show "End Date" field only when "Has End Date" is checked</td></tr>
<tr><td>Enable / Disable</td><td>Disable salary field unless user has "HR_MANAGER" role</td></tr>
<tr><td>Set Value</td><td>Auto-populate city when user selects zip code from LOV</td></tr>
<tr><td>Refresh</td><td>Reload report/chart after user changes a filter</td></tr>
<tr><td>Execute JavaScript</td><td>Custom validations, third-party library calls</td></tr>
<tr><td>Execute PL/SQL</td><td>Run server-side code without full page submit (AJAX)</td></tr></table>

<h2>Cascading LOV — Most Common Pattern</h2>
<ol>
<li>Create DA on <code>P3_DEPT_ID</code> → Event: Change</li>
<li>Action: Refresh → Item: <code>P3_EMP_ID</code></li>
<li>In <code>P3_EMP_ID</code>'s LOV SQL: <code>SELECT name d, id r FROM employees WHERE dept_id = :P3_DEPT_ID</code></li>
<li>Set Cascading LOV Parent Item: <code>P3_DEPT_ID</code></li>
</ol>
<div class="card card-teal"><div class="card-label card-label-teal">What's happening</div><p>When dept changes, APEX fires an AJAX call, re-executes the LOV SQL with the new bind value, returns JSON, and re-populates the select list. All automatic.</p></div>

<h2>Execute PL/SQL via DA</h2>
<pre>-- Items to Submit: P4_EMP_ID
-- Items to Return: P4_SALARY, P4_DEPT_NAME
DECLARE
  v_sal NUMBER; v_dept VARCHAR2(100);
BEGIN
  SELECT e.salary, d.dept_name INTO v_sal, v_dept
  FROM   employees e JOIN departments d ON e.dept_id = d.dept_id
  WHERE  e.emp_id = :P4_EMP_ID;
  :P4_SALARY := v_sal;
  :P4_DEPT_NAME := v_dept;
END;</pre>

<div class="card card-amber"><div class="card-label card-label-amber">Debugging DAs</div><p>Open browser console → watch for APEX AJAX calls. Each DA with Execute PL/SQL shows up as a POST to <code>wwv_flow.accept</code>. If it fails, the error JSON is in the response.</p></div>
<div class="card card-red"><div class="card-label card-label-red">Beginner Mistake</div><p>Putting business logic inside JavaScript DAs. Always prefer PL/SQL for data operations — JS should only handle UI effects. Keep business logic server-side and testable.</p></div>
</div>`,

`<div>
<h2>Where PL/SQL Appears in APEX</h2>
<div class="arch">Page Processing
├── Computations    → Set item values before page renders
├── Validations     → Check data before save
├── Processes       → Execute DML/business logic on submit
└── Branches        → Navigate to different page after process

Dynamic Actions
└── Execute PL/SQL  → Server-side AJAX (no page reload)

Application
├── Application Processes → Run on every page
└── Application Computations → Set app-level items</div>

<h2>Page Process — The Most Important Concept</h2>
<pre>-- Custom Process: "Promote Employee"
DECLARE
  v_emp_id NUMBER := :P10_EMP_ID;
BEGIN
  IF :P10_NEW_SALARY < :P10_CURRENT_SALARY THEN
    RAISE_APPLICATION_ERROR(-20001, 'New salary cannot be less than current');
  END IF;
  UPDATE employees
  SET    salary = :P10_NEW_SALARY, modified_by = :APP_USER, modified_dt = SYSDATE
  WHERE  emp_id = v_emp_id;
  INSERT INTO emp_audit_log(emp_id, action, old_salary, new_salary, done_by, done_dt)
  VALUES(v_emp_id, 'PROMOTION', :P10_CURRENT_SALARY, :P10_NEW_SALARY, :APP_USER, SYSDATE);
  COMMIT;
  APEX_APPLICATION.G_PRINT_SUCCESS_MESSAGE := 'Promotion saved.';
EXCEPTION
  WHEN OTHERS THEN ROLLBACK; RAISE;
END;</pre>

<h2>Validations</h2>
<pre>-- PL/SQL Function (returning error text) — NULL = valid
DECLARE v_count NUMBER;
BEGIN
  SELECT COUNT(*) INTO v_count FROM employees
  WHERE email = :P4_EMAIL AND emp_id != NVL(:P4_EMP_ID, -1);
  IF v_count > 0 THEN RETURN 'This email address is already in use.'; END IF;
  RETURN NULL;
END;</pre>

<h2>Using Packages (Enterprise Pattern)</h2>
<div class="card card-accent"><div class="card-label card-label-accent">Production-Level Pattern</div><p>Never write business logic directly in page processes. Wrap everything in DB packages. APEX page process calls the package → package does the work. Makes logic testable, reusable, and version-controllable.</p></div>
<pre>-- APEX Page Process (thin wrapper):
DECLARE v_id NUMBER; BEGIN
  pkg_employee.create_employee(:P4_FIRST_NAME, :P4_LAST_NAME, :P4_DEPT_ID, :P4_SALARY, v_id);
  :P4_EMP_ID := v_id;
END;</pre>

<h2>Exception Handling in APEX</h2>
<pre>EXCEPTION
  WHEN DUP_VAL_ON_INDEX THEN
    APEX_ERROR.ADD_ERROR(
      p_message => 'Duplicate entry found.',
      p_display_location => apex_error.c_inline_in_notification);
  WHEN OTHERS THEN
    INSERT INTO error_log(err_msg,err_stack,page_id,app_user,err_dt)
    VALUES(SQLERRM,DBMS_UTILITY.FORMAT_ERROR_BACKTRACE,:APP_PAGE_ID,:APP_USER,SYSTIMESTAMP);
    COMMIT; RAISE;</pre>
</div>`,

`<div>
<h2>Security Model</h2>
<div class="arch">Request arrives
    ↓ Authentication: Is user logged in?
    ↓ Authorization: Can this user access this page?
    ↓ Session State Protection: Are URL parameters tampered?
    ↓ Input Validation: SQL injection? XSS?
    ↓ Page renders (or error/redirect)</div>

<h2>Authentication Schemes</h2>
<table><tr><th>Scheme</th><th>Use case</th><th>Enterprise use</th></tr>
<tr><td>Application Express</td><td>APEX-managed users</td><td>Dev/demo only</td></tr>
<tr><td>Database Accounts</td><td>Oracle DB users login</td><td>Internal tools</td></tr>
<tr><td>LDAP</td><td>Active Directory / corporate login</td><td><span class="hl-teal">Very common</span></td></tr>
<tr><td>SAML / Social</td><td>SSO, Google, Azure AD</td><td>Modern enterprise</td></tr>
<tr><td>Custom PL/SQL</td><td>Your own user table</td><td>Full control</td></tr></table>

<h2>Authorization Scheme</h2>
<pre>-- Type: PL/SQL Function returning Boolean
DECLARE v_count NUMBER;
BEGIN
  SELECT COUNT(*) INTO v_count FROM user_roles
  WHERE username = :APP_USER AND role_code = 'HR_MANAGER';
  RETURN v_count > 0;
END;</pre>
<p>Apply to: Pages, Regions, Buttons, Items, Menu entries.</p>

<div class="card card-red"><div class="card-label card-label-red">Session State Protection — Critical</div><p>Without SSP, a malicious user can modify URL parameters: <code>&P3_EMP_ID=999</code> to access other records. Enable "Restricted - May not be set from browser" on <strong>all Primary Key items</strong> in forms.</p></div>

<div class="card card-teal"><div class="card-label card-label-teal">SQL Injection Protection</div><p>APEX automatically uses bind variables when you use <code>:ITEM_NAME</code> syntax. Never concatenate user input into SQL. Don't use <code>'WHERE id='||:P1_ID</code> — use proper bind: <code>WHERE id = :P1_ID</code>.</p></div>

<h2>Security Checklist</h2>
<div class="card card-amber"><div class="card-label card-label-amber">Before Production Deployment</div>
<ol><li>All PK items: Restricted session state protection</li>
<li>Authorization schemes on all sensitive pages</li>
<li>Escape HTML: Yes on all report columns showing user input</li>
<li>Custom auth using password hashing (not plain text)</li>
<li>HTTPS enforced (ORDS config)</li>
<li>Debug mode disabled in production</li>
<li>Application locked from export without password</li></ol>
</div>
</div>`,

`<div>
<h2>Three Ways to Integrate APIs</h2>
<div class="g3">
<div class="card card-accent"><div class="card-label card-label-accent">REST Data Source</div><p>Declarative wizard. Best for read-heavy data display in reports/cards.</p></div>
<div class="card card-teal"><div class="card-label card-label-teal">APEX_WEB_SERVICE</div><p>PL/SQL package for calling APIs in processes. Best for write operations.</p></div>
<div class="card card-blue"><div class="card-label card-label-blue">UTL_HTTP</div><p>Low-level Oracle HTTP package. Use when you need full header control.</p></div>
</div>

<h2>Calling APIs in PL/SQL Processes</h2>
<pre>DECLARE
  l_response  CLOB;
  l_json      APEX_JSON.T_VALUES;
  l_emp_name  VARCHAR2(200);
BEGIN
  l_response := APEX_WEB_SERVICE.MAKE_REST_REQUEST(
    p_url         => 'https://api.example.com/employees/101',
    p_http_method => 'GET',
    p_transfer_timeout => 30);
  APEX_JSON.PARSE(l_json, l_response);
  l_emp_name := APEX_JSON.GET_VARCHAR2(p_values => l_json, p_path => 'data.name');
  :P5_API_RESULT := l_emp_name;
EXCEPTION WHEN OTHERS THEN :P5_API_ERROR := 'API call failed: ' || SQLERRM;
END;</pre>

<h2>Bearer Token Auth</h2>
<pre>APEX_WEB_SERVICE.SET_REQUEST_HEADERS(
  p_name_01  => 'Authorization',
  p_value_01 => 'Bearer ' || v_token,
  p_name_02  => 'Content-Type',
  p_value_02 => 'application/json');

l_response := APEX_WEB_SERVICE.MAKE_REST_REQUEST(
  p_url => 'https://api.example.com/create',
  p_http_method => 'POST',
  p_body => '{"name":"John","dept":5}');</pre>

<h2>Exposing APEX as a REST API (ORDS)</h2>
<div class="card card-teal"><div class="card-label card-label-teal">SQL Workshop → RESTful Services → Create Module</div><p>Module: <code>employees</code> | URI: <code>/list/</code> | Handler: GET<br>One SQL query → instantly creates <code>https://your-apex/ords/schema/employees/list/</code> returning JSON.</p></div>

<div class="card card-amber"><div class="card-label card-label-amber">Store API Keys Securely</div><p>Never hardcode API keys in page processes. Store in APEX Application Settings (Shared Components → App Settings). Access via <code>APEX_UTIL.GET_ATTRIBUTE()</code>.</p></div>

<h2>Debugging API Calls</h2>
<ul>
<li>Check <code>APEX_WEB_SERVICE.G_STATUS_CODE</code> — 200=OK, 401=Auth error, 404=Not found</li>
<li>Log <code>l_response CLOB</code> to a debug table before parsing</li>
<li>Use REST Data Source → Test tab (built-in Postman equivalent)</li>
</ul>
</div>`,

`<div>
<h2>Why APEX Apps Get Slow</h2>
<div class="arch">Top causes (by frequency):
1. Reports with no WHERE clause → full table scans
2. Nested queries / unindexed joins in report SQL
3. Too many AJAX calls per page (too many DAs)
4. Session state reading large CLOBs repeatedly
5. No caching on LOVs used everywhere
6. Too many items on a single page (>50 items = slow render)
7. External API calls in page load processes (synchronous)</div>

<h2>Query Optimization</h2>
<pre>-- BAD: Full table scan, no filter
SELECT * FROM employees;

-- GOOD: Index on status + dept_id
SELECT emp_id, first_name, last_name, salary
FROM   employees
WHERE  status = 'ACTIVE' AND dept_id = :P3_DEPT_ID;

-- Add indexes:
CREATE INDEX idx_emp_status ON employees(status);
CREATE INDEX idx_emp_dept   ON employees(dept_id);</pre>

<h2>LOV Caching</h2>
<pre>-- Set "Caching: Cached within Session" on LOV
-- Runs SQL once per session, not on every page load
SELECT dept_name d, dept_id r FROM departments ORDER BY dept_name</pre>

<h2>Session State Optimization</h2>
<ul>
<li>Don't store large text/CLOB in session state items</li>
<li>Clear items when no longer needed: <code>APEX_UTIL.SET_SESSION_STATE('P4_TEMP', NULL)</code></li>
<li>Use Page 0 (Global Page) items only for truly app-wide values</li>
</ul>

<div class="card card-teal"><div class="card-label card-label-teal">Page Caching</div><p>For static/near-static pages: set cache lifetime = 60 minutes. APEX stores rendered HTML, skips DB call entirely for cached duration.</p></div>

<h2>Debugging Slow Pages</h2>
<div class="flow">
<div class="flow-item"><div class="flow-line"><div class="flow-dot"></div><div class="flow-connector"></div></div><div class="flow-text"><strong>Enable Debug</strong>Add <code>?p_debug=YES</code> to URL or click Debug button</div></div>
<div class="flow-item"><div class="flow-line"><div class="flow-dot"></div><div class="flow-connector"></div></div><div class="flow-text"><strong>View Debug Log</strong>App Builder → Utilities → Debug Messages</div></div>
<div class="flow-item"><div class="flow-line"><div class="flow-dot"></div><div class="flow-connector"></div></div><div class="flow-text"><strong>Find slow queries</strong>Look for "SQL query elapsed" > 1 second</div></div>
<div class="flow-item"><div class="flow-line"><div class="flow-dot"></div><div class="flow-connector"></div></div><div class="flow-text"><strong>EXPLAIN PLAN</strong>Run on slow queries in SQL Workshop</div></div>
</div>

<div class="card card-green"><div class="card-label card-label-green">Performance Checklist</div>
<ul><li>All reports have WHERE clauses with indexed columns</li><li>No SELECT * in any report</li><li>All LOVs have caching enabled where data is static</li><li>Maximum rows per page ≤ 25</li><li>EXPLAIN PLAN run on top 5 heaviest queries</li></ul>
</div>
</div>`,

`<div>
<h2>The Debugging Toolkit</h2>
<div class="g2">
<div class="card card-accent"><div class="card-label card-label-accent">APEX Debug Mode</div><p>Add <code>?p_debug=YES</code> to URL. Shows every process, query, session state value, and elapsed time.</p></div>
<div class="card card-blue"><div class="card-label card-label-blue">Browser Console</div><p>F12 → Console. APEX logs JS errors, failed AJAX calls, DA execution. Network tab shows APEX POST requests.</p></div>
<div class="card card-teal"><div class="card-label card-label-teal">Error Messages</div><p>ORA-20001 (app error), ORA-01400 (NOT NULL), ORA-00001 (unique), ORA-02291 (FK violation).</p></div>
<div class="card card-amber"><div class="card-label card-label-amber">SQL Workshop First</div><p>Test your report/LOV SQL here before putting it in APEX. 80% of APEX errors are SQL errors.</p></div>
</div>

<h2>Systematic Debug Framework</h2>
<div class="flow">
<div class="flow-item"><div class="flow-line"><div class="flow-dot"></div><div class="flow-connector"></div></div><div class="flow-text"><strong>Reproduce the exact scenario</strong>Don't guess — confirm the exact steps that trigger the error</div></div>
<div class="flow-item"><div class="flow-line"><div class="flow-dot"></div><div class="flow-connector"></div></div><div class="flow-text"><strong>Enable Debug mode</strong>p_debug=YES → look for red/orange debug rows</div></div>
<div class="flow-item"><div class="flow-line"><div class="flow-dot"></div><div class="flow-connector"></div></div><div class="flow-text"><strong>Identify category</strong>SQL error? Process error? DA error? Session state issue?</div></div>
<div class="flow-item"><div class="flow-line"><div class="flow-dot"></div><div class="flow-connector"></div></div><div class="flow-text"><strong>Test in SQL Workshop</strong>Isolate and fix the failing SQL/PL/SQL</div></div>
<div class="flow-item"><div class="flow-line"><div class="flow-dot"></div><div class="flow-connector"></div></div><div class="flow-text"><strong>Fix and verify</strong>Debug log should show clean — no red lines</div></div>
</div>

<h2>Common Errors and Fixes</h2>
<table><tr><th>Error</th><th>Cause</th><th>Fix</th></tr>
<tr><td>No data found</td><td>SELECT INTO returned 0 rows</td><td>Use COUNT first or add exception handler</td></tr>
<tr><td>Too many rows</td><td>SELECT INTO returned 2+ rows</td><td>Add ROWNUM=1 or use cursor</td></tr>
<tr><td>ORA-01400 NULL</td><td>NOT NULL column has null value</td><td>Add required validation on form item</td></tr>
<tr><td>ORA-00001 Unique</td><td>Duplicate value in unique column</td><td>Add uniqueness validation</td></tr>
<tr><td>DA not firing</td><td>Wrong event/element, bad condition</td><td>Check event type and affected element names</td></tr></table>

<h2>Production Logging Pattern</h2>
<pre>EXCEPTION
  WHEN OTHERS THEN
    INSERT INTO app_error_log(app_id,page_id,username,error_msg,stack,log_dt)
    VALUES(:APP_ID,:APP_PAGE_ID,:APP_USER,SQLERRM,
           DBMS_UTILITY.FORMAT_ERROR_BACKTRACE,SYSTIMESTAMP);
    COMMIT; RAISE;</pre>
<div class="card card-red"><div class="card-label card-label-red">Production Mindset</div><p>Never swallow exceptions silently (empty EXCEPTION block). Always log, always re-raise. Silent failures are the hardest bugs to find in production.</p></div>
</div>`,

`<div>
<h2>Enterprise Deployment Pipeline</h2>
<div class="arch">Developer Machine (DEV workspace)
    ↓  [Export .sql file]
Version Control (Git)
    ↓  [Pull, review, approve]
TEST Environment (QA workspace)
    ↓  [Import, test, sign-off]
PRODUCTION Environment (PROD workspace)
    ↓  [Import with verified file]
Live Application</div>

<h2>Exporting an Application</h2>
<ol>
<li>App Builder → your app → Export/Import → Export</li>
<li>Export As: Application | Include Supporting Objects: Yes</li>
<li>Downloads <code>fXXX.sql</code> — entire app definition in SQL</li>
</ol>
<div class="card card-amber"><div class="card-label card-label-amber">Important</div><p>The export contains your APP but NOT your database tables/data. Deploy DB changes separately using a DDL script. Always maintain a <code>db_changes.sql</code> file alongside your APEX export.</p></div>

<h2>Git Strategy for APEX Teams</h2>
<div class="card card-accent"><div class="card-label card-label-accent">Version Control</div>
<ul><li>One Git repo per application</li><li>Branch per feature: <code>feature/employee-form-validation</code></li><li>Export after every meaningful change → commit to branch</li><li>PR review includes reviewing APEX export diff</li><li>Main branch = what's in PROD | Tag releases: <code>v1.0.0</code></li></ul>

`<div>
<h2>Beginner Level</h2>
<table><tr><th>Question</th><th>Key points</th></tr>
<tr><td>What is Oracle APEX?</td><td>Low-code platform inside Oracle DB, PL/SQL engine, ORDS for HTTP, generates web apps</td></tr>
<tr><td>What is session state?</td><td>In-memory key-value store per session, persisted in Oracle DB, cleared on logout</td></tr>
<tr><td>What is a Dynamic Action?</td><td>Event-driven UI behavior — when/condition/then structure, client-side or server-side AJAX</td></tr>
<tr><td>IR vs Classic Report?</td><td>IR = user-customizable, AJAX-driven, saved views. Classic = fixed HTML table, for print/PDF</td></tr>
<tr><td>What is a Parsing Schema?</td><td>The Oracle DB user whose privileges APEX uses to run SQL</td></tr></table>

<h2>Intermediate Level</h2>
<table><tr><th>Question</th><th>Expert answer signal</th></tr>
<tr><td>How does APEX handle SQL injection?</td><td>Bind variables (:P1_ITEM) — APEX never concatenates user input. Also APEX_ESCAPE.HTML for output.</td></tr>
<tr><td>Auth vs Authorization in APEX?</td><td>Auth = who you are (login scheme). Authz = what you can do (scheme on page/component).</td></tr>
<tr><td>What is Session State Protection?</td><td>Prevents URL parameter tampering. Checksums on PK items. Set "Restricted" on sensitive items.</td></tr>
<tr><td>Optimize a slow report?</td><td>Add WHERE with indexed columns, avoid SELECT *, EXPLAIN PLAN, enable LOV caching, use pagination.</td></tr>
<tr><td>What are APEX Collections?</td><td>Session-level temp tables (wwv_flow_collections). Multi-row staging before final commit.</td></tr></table>

<h2>Scenario Questions</h2>
<div class="g2">
<div class="card card-accent"><div class="card-label card-label-accent">Slow page in production?</div><p>Debug mode → query elapsed times → EXPLAIN PLAN → check full table scans → add indexes → check LOV caching → review session state size. Never optimize blindly — measure first.</p></div>
<div class="card card-teal"><div class="card-label card-label-teal">Role-based access system?</div><p>USER_ROLES table → Authorization Schemes per role (PL/SQL boolean) → apply to pages, regions, buttons, menus. Row-level: add WHERE :APP_USER check in report SQL.</p></div>
<div class="card card-blue"><div class="card-label card-label-blue">Deploy DEV to PROD?</div><p>Export as .sql → commit to Git → apply DB DDL to PROD → import APEX export to PROD → smoke test. Supporting Objects for DB scripts.</p></div>
<div class="card card-green"><div class="card-label card-label-green">Signal seniority by mentioning:</div><ul><li>PL/SQL packages, not inline logic</li><li>Views as report sources</li><li>Git for APEX exports</li><li>Error logging with APEX_ERROR</li></ul></div>
</div>

<h2>Traps to Avoid</h2>
<div class="card card-red"><div class="card-label card-label-red">Common Wrong Answers</div>
<ul><li>"APEX stores data in its own database" → WRONG. Uses your parsing schema.</li>
<li>"Session state is permanent" → WRONG. Session-scoped, clears on logout.</li>
<li>"Dynamic Actions only run JavaScript" → WRONG. Execute PL/SQL server-side via AJAX.</li>
<li>"You can't call REST APIs from APEX" → WRONG. APEX_WEB_SERVICE handles this natively.</li></ul>
</div>
</div>`,

`<div>
<div class="g2">
<div class="card card-accent"><div class="card-label card-label-accent">Always Do</div>
<ul><li>Build reports on VIEWS not raw JOINs</li><li>Business logic in PL/SQL packages</li><li>Test SQL in SQL Workshop first</li><li>Export to Git after every change</li><li>Page 9999 for global nav/logout</li><li>Use named items (P3_EMP_ID)</li></ul></div>
<div class="card card-red"><div class="card-label card-label-red">Never Do</div>
<ul><li>Build on SYS or SYSTEM schema</li><li>SELECT * in reports</li><li>Store plain text passwords</li><li>Empty EXCEPTION blocks</li><li>Hardcode API keys in processes</li><li>PUT heavy API calls in page load</li></ul></div>
</div>

<h2>Keyboard Shortcuts</h2>
<table><tr><th>Shortcut</th><th>Action</th></tr>
<tr><td><code>Ctrl+S</code></td><td>Save page — use constantly</td></tr>
<tr><td><code>Ctrl+Shift+F</code></td><td>Find in APEX — search across all pages/regions</td></tr>
<tr><td><code>F6</code></td><td>Run page</td></tr>
<tr><td><code>Ctrl+Enter</code></td><td>Run SQL in SQL Workshop</td></tr>
<tr><td><code>Escape</code></td><td>Close APEX dialog without saving</td></tr></table>

<h2>URL Hacks & Quick Tricks</h2>
<div class="card card-teal"><div class="card-label card-label-teal">Builder URL Hacks</div>
<ul><li>Add <code>&p_debug=YES</code> to any running app URL for instant debug</li><li>In App Builder URL: change page number to jump directly to any page</li><li>Use "Lock" on pages you're editing to prevent team conflicts</li></ul></div>

<div class="card card-blue"><div class="card-label card-label-blue">Quick-Build Techniques</div>
<ul><li>Create Form + Report together — fastest CRUD setup</li><li>Right-click page thumbnail → Copy → duplicate similar pages</li><li>Copy a region → "Copy to Other Page" — great for dashboard widgets</li><li>Double-click any element in running app → jumps to edit screen</li></ul></div>

<h2>Did You Know</h2>
<div class="card card-amber"><div class="card-label card-label-amber">Uncommon but powerful</div>
<ul><li>APEX has built-in email API: <code>APEX_MAIL.SEND()</code> — no SMTP config in your code</li><li>IR columns can highlight red if salary &lt; 30000 with zero JS</li><li>APEX has PWA support built-in — installable as mobile app in one click</li><li>End users can submit app feedback right inside the running app</li></ul></div>
</div>`,

`<div>
<div class="card card-accent"><div class="card-label card-label-accent">Project Scope</div><p>Employee records, departments, job roles, payroll reports, leave management, role-based access (Admin, HR Manager, Employee, Manager).</p></div>

<h2>Phase 1 — Database Schema</h2>
<pre>CREATE TABLE departments (dept_id NUMBER IDENTITY PK, dept_name VARCHAR2(100), location VARCHAR2(100));
CREATE TABLE jobs (job_id NUMBER IDENTITY PK, job_title VARCHAR2(100), min_salary NUMBER, max_salary NUMBER);
CREATE TABLE employees (emp_id NUMBER IDENTITY PK, first_name VARCHAR2(100), last_name VARCHAR2(100),
  email VARCHAR2(200) UNIQUE, hire_date DATE DEFAULT SYSDATE,
  job_id NUMBER FK→jobs, dept_id NUMBER FK→departments,
  manager_id NUMBER FK→employees(emp_id),  -- self-referential!
  salary NUMBER(10,2), status VARCHAR2(10) DEFAULT 'ACTIVE');
CREATE TABLE leave_requests (req_id NUMBER IDENTITY PK, emp_id NUMBER FK→employees,
  leave_type VARCHAR2(30), start_date DATE, end_date DATE,
  reason VARCHAR2(500), status VARCHAR2(20) DEFAULT 'PENDING',
  approved_by NUMBER FK→employees, submitted_dt TIMESTAMP DEFAULT SYSTIMESTAMP);
CREATE TABLE app_users (username VARCHAR2(100) PK, emp_id NUMBER FK→employees, password_hash VARCHAR2(200));
CREATE TABLE user_roles (username VARCHAR2(100), role_code VARCHAR2(50), PRIMARY KEY(username,role_code));</pre>

<h2>Manager Approval Workflow</h2>
<pre>-- Button: "Approve" (Authorization: HR Manager or Direct Manager)
BEGIN
  UPDATE leave_requests
  SET status = 'APPROVED',
      approved_by = (SELECT emp_id FROM app_users WHERE username=:APP_USER)
  WHERE req_id = :P301_REQ_ID;
  APEX_MAIL.SEND(
    p_to   => (SELECT email FROM employees e JOIN leave_requests l ON e.emp_id=l.emp_id WHERE l.req_id=:P301_REQ_ID),
    p_from => 'hr@company.com',
    p_subj => 'Your leave request has been approved',
    p_body => 'Leave from '||:P301_START_DATE||' to '||:P301_END_DATE||' is approved.');
  COMMIT;
END;</pre>
